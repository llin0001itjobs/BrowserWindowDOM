<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta charset="UTF-8">
<title>Register User</title>
<link th:href="@{/css/apache-2-default-ui.css}" rel="stylesheet" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
.container {
	min-width: 300px;
	max-width: 400px;
}
</style>
</head>
<body>
	<div class="container">
		<div th:if="${message}" class="row alert alert-danger">
			<p th:text="${message}"></p>
		</div>
		<!-- Register Form -->
		<div class="container" id="formRegister">
			<form method="post" th:action="@{/register}" th:object="${user}"
				class="form-register mt-3 needs-validation" novalidate>
				<h2 class="form-signin-heading">Register User</h2>

				<div class="row mt-3">
					<div class="text-danger" th:if="${#fields.hasErrors('username')}"
						th:errors="*{username}"></div>
					<label for="username" class="sr-only screenreader">User</label> <input
						type="text" id="username" th:field="*{username}"
						class="form-control" placeholder="User" required>
				</div>
				<div class="row mt-3">
					<div class="text-danger" th:if="${#fields.hasErrors('email')}"
						th:errors="*{email}"></div>
					<label for="email" class="sr-only screenreader">Email</label> <input
						type="email" id="email" th:field="*{email}" class="form-control"
						placeholder="Email" required>
				</div>
				<!-- New Password -->
				<div class="row mt-3">
					<div class="text-danger"
						th:if="${#fields.hasErrors('newPassword')}"
						th:errors="*{newPassword}"></div>
					<label for="newPassword" class="sr-only screenreader">New
						Password <span class="text-danger">*</span>
					</label>
					<!-- Bootstrap inline error message -->
					<div class="invalid-feedback">Must contain at least 12
						characters, including 1 uppercase letter, 1 lowercase letter, 1
						number, and 1 special character.</div>
					<input type="password" id="newPassword" th:field="*{newPassword}"
						class="form-control" placeholder="New Password" required
						minlength="12" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
						title="Must contain at least 12 characters, including 1 uppercase, 1 lowercase, 1 number, and 1 special character (@$!%*?&-).">
				</div>

				<!-- Confirm Password -->
				<div class="row mt-3">
					<div class="text-danger"
						th:if="${#fields.hasErrors('confirmPassword')}"
						th:errors="*{confirmPassword}"></div>
					<label for="confirmPassword" class="sr-only screenreader">Confirm
						Password <span class="text-danger">*</span>
					</label>
					<!-- Bootstrap inline error message -->
					<div class="invalid-feedback">Must contain at least 12
						characters, including 1 uppercase letter, 1 lowercase letter, 1
						number, and 1 special character.</div>
					<input type="password" id="confirmPassword"
						th:field="*{confirmPassword}" class="form-control"
						placeholder="Confirm Password" required minlength="12"
						pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
						title="Must contain at least 12 characters, including 1 uppercase, 1 lowercase, 1 number, and 1 special character (@$!%*?&-).">
				</div>
				<div class="row mt-3">
					<div class="col">
						<button type="submit" class="btn btn-secondary my-1"
							value="cancel">Cancel</button>
					</div>
					<div class="col">
						<button type="submit" class="btn btn-primary my-1" value="done">Done</button>
					</div>
				</div>
				<div class="row">
					<input type="hidden" th:name="${_csrf.parameterName}"
						th:value="${_csrf.token}">
				</div>
			</form>
		</div>
	</div>
</body>
<script>
	document.getElementById('confirmPassword').addEventListener('input',
			function() {
				const newPwd = document.getElementById('newPassword').value;
				if (this.value !== newPwd) {
					this.setCustomValidity("Passwords do not match");
				} else {
					this.setCustomValidity("");
				}
			});

    // Bootstrap 5 client-side validation script
    (() => {
        'use strict';

        const forms = document.querySelectorAll('.needs-validation');

        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();

</script>
</html>
