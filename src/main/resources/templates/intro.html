<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Window Object Explorer • Reflection + Bootstrap 5 +
	Thymeleaf</title>
<!-- Bootstrap 5.3.x CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">
<!-- Bootstrap Icons -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
:root {
	--bs-body-bg: #f8f9fa;
}

body.py-4 {
	font-size: 0.875rem;
	line-height: 1.45;
}

.badge {
	font-size: 0.75em;
}

.tree-container {
	font-size: 0.85rem;
}

summary {
	padding: 0.6rem 0.9rem;
	font-size: 0.9rem;
}

.leaf-value {
	font-size: 0.8rem;
}

img {
	max-width: 75%;
	height: auto;
	border-radius: 0.25rem;
}

.tree-container {
	max-height: 85vh;
	overflow-y: auto;
	border: 1px solid #dee2e6;
	border-radius: 0.5rem;
	background: #fff;
	box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, .075);
	padding: 1rem;
}

.ms-4.border-start {
	border-left: 3px solid #0d6efd !important;
}
</style>
</head>
<body class="py-4">

	<div class="container-fluid">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<div>
				<h1 class="h2 mb-0">Window Object Explorer</h1>
				<p class="text-muted mb-0">
					JavaScript reflection • up to 3 generations • <strong>Scaled
						smaller</strong>
				</p>
			</div>

			<div class="d-flex gap-2">
				<button id="btn-print" class="btn btn-outline-primary btn-sm"
					title="Open printable preview">
					<img alt="" th:src="@{/images/printer-icon.png}" height="20px"
						width="20px">
				</button>
				<button id="btn-collapse-all"
					class="btn btn-outline-secondary btn-sm" title="Collapse All">--</button>
				<button id="btn-expand-level1"
					class="btn btn-outline-primary btn-sm" title="Expand All">++</button>
				<a th:href="@{/home}" class="btn btn-outline-secondary btn-sm" title="Home">←←</a>
			</div>
		</div>

		<div class="alert alert-info border-0 shadow-sm">
			<strong>How it works:</strong> Pure client-side JavaScript
			reflection. Print button opens a clean
			<code>&lt;ul&gt;&lt;li&gt;</code>
			page (fully expanded) with Save-to-Desktop button.
		</div>

		<div id="tree-container" class="tree-container p-3"></div>

		<div class="mt-4 text-center text-muted small">Built as a
			drop-in Thymeleaf template.</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>

	<script th:inline="javascript">
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function buildPrintList(obj, path = 'window', depth = 0) {
            const MAX_DEPTH = 3;
            if (depth > MAX_DEPTH) return '';

            const type = obj === null ? 'null' : typeof obj;
            let html = `<li><strong>${escapeHtml(path)}</strong> <span class="badge bg-secondary">${type}</span>`;

            if (type === 'function') html += ' <span class="badge bg-success">ƒ</span>';

            if (depth === MAX_DEPTH || (type !== 'object' && type !== 'function') || obj === null) {
                let valueStr = '';
                try {
                    valueStr = String(obj);
                    if (valueStr.length > 120) valueStr = valueStr.substring(0, 117) + '...';
                } catch (e) { valueStr = '(unstringifiable)'; }

                if (type === 'object' && obj !== null && depth === MAX_DEPTH) {
                    valueStr = 'Object (max depth reached)';
                }
                html += ` <span class="text-muted small">: <code>${escapeHtml(valueStr)}</code></span></li>`;
                return html;
            }

            html += '<ul class="print-tree-sub">';
            let props = [];
            try {
                props = Object.getOwnPropertyNames(obj).sort((a, b) => a.localeCompare(b));
            } catch (e) {
                html += '<li class="text-danger small">Cannot enumerate properties</li></ul></li>';
                return html;
            }

            if (props.length === 0) {
                html += '<li class="text-muted small">No own properties</li></ul></li>';
                return html;
            }

            const isSelfReference = (child) => child === obj || (typeof child === 'object' && child !== null && child === window);

            props.forEach(prop => {
                let child = null;
                try { child = Reflect.get(obj, prop); } catch (e) {
                    html += `<li class="text-danger small">${escapeHtml(prop)}: (access error)</li>`;
                    return;
                }
                if (isSelfReference(child)) {
                    html += `<li class="text-muted small">${escapeHtml(prop)}: [self / window reference]</li>`;
                    return;
                }
                const childHtml = buildPrintList(child, `${path}.${prop}`, depth + 1);
                if (childHtml) html += childHtml;
            });

            html += '</ul></li>';
            return html;
        }

        function createTreeNode(obj, path = 'window', depth = 0) {
            const MAX_DEPTH = 3;
            if (depth > MAX_DEPTH) return null;

            const details = document.createElement('details');
            details.className = 'border rounded-3 overflow-hidden mb-1';

            const summary = document.createElement('summary');
            const type = obj === null ? 'null' : typeof obj;
            summary.innerHTML = `
                <div class="summary-content">
                    <strong>${path}</strong>
                    <span class="badge rounded-pill bg-secondary">${type}</span>
                    ${type === 'function' ? '<span class="badge rounded-pill bg-success ms-1">ƒ</span>' : ''}
                </div>
            `;
            details.appendChild(summary);

            const content = document.createElement('div');
            content.className = 'ms-4 border-start ps-3 pb-3';

            if (depth === MAX_DEPTH || (type !== 'object' && type !== 'function') || obj === null) {
                let valueStr = '';
                try {
                    valueStr = String(obj);
                    if (valueStr.length > 120) valueStr = valueStr.substring(0, 117) + '...';
                } catch (e) { valueStr = '(unstringifiable)'; }
                content.innerHTML = `
                    <div class="leaf-value">
                        ${type === 'object' && obj !== null ? '<em>Object (max depth reached)</em>' : `<strong>Value:</strong> <code>${valueStr}</code>`}
                    </div>
                `;
                details.appendChild(content);
                return details;
            }

            let props = [];
            try {
                props = Object.getOwnPropertyNames(obj).sort((a, b) => a.localeCompare(b));
            } catch (e) {
                content.innerHTML = `<span class="text-danger small">Cannot enumerate properties</span>`;
                details.appendChild(content);
                return details;
            }

            if (props.length === 0) {
                content.innerHTML = `<em class="text-muted small">No own properties</em>`;
                details.appendChild(content);
                return details;
            }

            const isSelfReference = (child) => child === obj || (typeof child === 'object' && child !== null && child === window);

            props.forEach(prop => {
                let child = null;
                try { child = Reflect.get(obj, prop); } catch (e) {
                    const err = document.createElement('div');
                    err.className = 'text-danger small mt-1';
                    err.textContent = `${prop}: (access error)`;
                    content.appendChild(err);
                    return;
                }
                if (isSelfReference(child)) {
                    const skip = document.createElement('div');
                    skip.className = 'text-muted small mt-1';
                    skip.textContent = `${prop}: [self / window reference]`;
                    content.appendChild(skip);
                    return;
                }
                const childNode = createTreeNode(child, `${path}.${prop}`, depth + 1);
                if (childNode) content.appendChild(childNode);
            });

            details.appendChild(content);
            return details;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('tree-container');

            const rootNode = createTreeNode(window, 'window', 0);
            if (rootNode) {
                rootNode.open = true;
                container.appendChild(rootNode);
            }

            // ====================== PRINT BUTTON (fixed syntax) ======================
            document.getElementById('btn-print').addEventListener('click', () => {
                const treeHtml = buildPrintList(window, 'window', 0);

                const printPageHTML = `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window Object Explorer — Printable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { padding: 2rem; background: #fff; font-family: system-ui, -apple-system, sans-serif; }
        .print-tree { list-style: none; padding-left: 0; }
        .print-tree ul { list-style: none; padding-left: 2rem; border-left: 2px dashed #0d6efd; margin-top: 0.25rem; }
        .print-tree li { margin-bottom: 0.75rem; }
        .no-print { display: block; }
        @media print { .no-print { display: none !important; } body { padding: 0.5rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4 no-print">
            <h1 class="h3 mb-0">Window Object Explorer <span class="badge bg-info">Fully Expanded • 3 generations</span></h1>
            <div>
                <button onclick="window.print()" class="btn btn-outline-primary btn-sm me-2">
                    <i class="bi bi-printer-fill"></i> Print
                </button>
                <button id="save-btn" class="btn btn-outline-success btn-sm">
                    <i class="bi bi-floppy-fill"></i> Save to Desktop
                </button>
            </div>
        </div>

        <div class="alert alert-info no-print">
            This is a clean snapshot of the <code>window</code> object rendered as simple <code>&lt;ul&gt;&lt;li&gt;</code> tags.
        </div>

        <ul class="print-tree">
            ${treeHtml}
        </ul>
    </div>

    <script>
        // Save to desktop as .html file
        document.getElementById('save-btn').addEventListener('click', function () {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'window-object-explorer.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    <\/script>   <!-- ← FIXED: escaped to prevent HTML parser from closing the outer script early -->
</body>
</html>`;

                const printWin = window.open('', '_blank', 'width=1300,height=900,scrollbars=yes');
                printWin.document.write(printPageHTML);
                printWin.document.close();
            });

            // Original collapse / expand buttons (unchanged)
            document.getElementById('btn-collapse-all').addEventListener('click', () => {
                const allDetails = container.querySelectorAll('details');
                allDetails.forEach(d => { if (d !== rootNode) d.open = false; });
            });

            document.getElementById('btn-expand-level1').addEventListener('click', () => {
                const level1 = container.querySelectorAll('details > details');
                level1.forEach(d => d.open = true);
            });

            console.log('%c✅ Window explorer ready with print & save features', 'color:#0d6efd;font-weight:bold');
        });
    </script>
</body>
</html>
