<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Request New Password</title>
<link th:href="@{/css/apache-2-default-ui.css}" rel="stylesheet" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
.container {
	min-width: 300px;
	max-width: 400px;
}
</style>
</head>
<body>
	<div class="container">
		<div th:if="${message}" class="row alert alert-success">
			<p th:text="${message}"></p>
		</div>

		<!-- Sign In Form -->
		<div class="container" id="formPasswords">
			<form class="form-signin" method="post"
				th:action="@{/requestNewPassword}"
				th:object="${requestNewPasswordForm}">
				<h2 class="form-signin-heading">Request New Password</h2>
				<div class="row mt-3">
					<div class="text-danger" th:if="${#fields.hasErrors('userName')}"
						th:errors="*{userName}"></div>
					<label for="userName" class="sr-only screenreader">User</label> <input
						type="text" id="userName" th:field="*{userName}"
						class="form-control" placeholder="User" required autofocus>
				</div>
				<div class="row mt-3">
					<div class="col">
						<button type="submit" class="btn btn-secondary my-1" name="cancel"
							value="true">Cancel</button>
					</div>
					<div class="col">
						<button type="submit" class="btn btn-primary my-1" name="done"
							value="true">Done</button>
					</div>
				</div>
				<div class="row">
					<input type="hidden" th:name="${_csrf.parameterName}"
						th:value="${_csrf.token}">				
				</div>				
			</form>
		</div>
	</div>
</body>
</html>
