<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Request Email</title>
<link th:href="@{/css/apache-2-default-ui.css}" rel="stylesheet" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
.container {
	min-width: 300px;
	max-width: 400px;
}
</style>
</head>
<body>
	<div class="container">
		<div th:if="${message}" class="row alert alert-success">
			<p th:text="${message}"></p>
		</div>

		<!-- Sign In Form -->
		<div class="container" id="forgotUser">
			<form class="form-signin" method="post" th:action="@{/forgotUser}"
				th:object="${forgotUserForm}">
				<h2 class="form-signin-heading">Forgot User</h2>
				<div class="text">Submit email associated with User Name</div>
				<div class="row mt-3">
					<div class="text-danger" th:if="${#fields.hasErrors('email')}"
						th:errors="*{email}"></div>
					<label for="email" class="sr-only screenreader">Email</label> <input
						type="email" id="email" th:field="*{email}" class="form-control"
						placeholder="Email" required autofocus>
				</div>
				<div class="row mt-3">
					<div class="col">
						<button type="submit" class="btn btn-secondary my-1" name="cancel"
							value="true">Cancel</button>
					</div>
					<div class="col">
						<button type="submit" class="btn btn-primary my-1" value="next">Next</button>
					</div>
				</div>
				<div class="row">
					<input type="hidden" th:name="${_csrf.parameterName}"
						th:value="${_csrf.token}">
				</div>
			</form>
		</div>
	</div>
</body>
</html>
