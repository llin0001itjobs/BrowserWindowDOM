<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Request New Password</title>
<link th:href="@{/css/apache-2-default-ui.css}" rel="stylesheet" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
.container {
	min-width: 300px;
	max-width: 400px;
}
</style>
</head>
<body>
	<div class="container">
		<div th:if="${message}" class="row alert alert-success">
			<p th:text="${message}"></p>
		</div>

		<!-- Sign In Form -->
		<div class="container" id="formPasswords">
			<form method="post" th:action="@{/setNewPassword}"
				th:object="${newPasswordForm}" class="form-signin needs-validation" novalidate>
				<h2 class="form-signin-heading">Set New Password</h2>
				<div class="row mt-3">
					<div class="text-danger"
						th:if="${#fields.hasErrors('newPassword')}"
						th:errors="*{newPassword}"></div>
					<!-- Bootstrap inline error message -->
					<div class="invalid-feedback">Must contain at least 12
						characters, including 1 uppercase letter, 1 lowercase letter, 1
						number, and 1 special character.</div>
					<label for="passwordNew" class="sr-only screenreader">New
						Password <span class="text-danger">*</span>
					</label> <input type="text" id="newPassword" th:field="*{newPassword}"
						class="form-control" placeholder="New Password" minlength="12"
						maxlength="32"
						pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
						title="Must contain at least 12 characters, including 1 uppercase, 1 lowercase, 1 number, and 1 special character (@$!%*?&-).">
				</div>
				<div class="row mt-3">
					<div class="text-danger"
						th:if="${#fields.hasErrors('confirmPassword')}"
						th:errors="*{confirmPassword}"></div>
					<!-- Bootstrap inline error message -->
					<div class="invalid-feedback">Must contain at least 12
						characters, including 1 uppercase letter, 1 lowercase letter, 1
						number, and 1 special character.</div>
					<label for="confirmPassword" class="sr-only screenreader">Confirm
						Password <span class="text-danger">*</span>
					</label> <input type="text" id="confirmPassword"
						th:field="*{confirmPassword}" class="form-control"
						placeholder="Confirm Password" minlength="12"
						maxlength="32"
						pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
						title="Must contain at least 12 characters, including 1 uppercase, 1 lowercase, 1 number, and 1 special character (@$!%*?&-).">
				</div>
				<div class="row mt-3">
					<div class="col">
						<button type="submit" class="btn btn-secondary my-1" name="cancel"
							value="true">Cancel</button>
					</div>
					<div class="col">
						<button type="submit" class="btn btn-primary my-1" name="done"
							value="true">Done</button>
					</div>
				</div>
				<div class="row">
					<input type="hidden" id="username" th:field="*{username}">
				</div>
			</form>
		</div>
	</div>
	<script>
    // Bootstrap 5 client-side validation script
	    (() => {
	        'use strict';
	
	        const forms = document.querySelectorAll('.needs-validation');
	
	        Array.from(forms).forEach(form => {
	            form.addEventListener('submit', event => {
	                if (!form.checkValidity()) {
	                    event.preventDefault();
	                    event.stopPropagation();
	                }
	                form.classList.add('was-validated');
	            }, false);
	        });
	    })();
</script>
</body>
</html>
