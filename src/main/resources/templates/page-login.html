<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Sign In</title>
<link th:href="@{/css/apache-2-default-ui.css}" rel="stylesheet" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
.container {
	min-width: 300px;
	max-width: 400px;
}
</style>
</head>
<body>
	<div class="container">
		<div th:if="${message}" class="row alert alert-success">
			<p th:text="${message}"></p>
		</div>

		<!-- Sign In Form -->
		<div class="container" id="formLogin">
			<form class="form-signin" method="post" th:action="@{/login}"
				th:object="${user}">
				<h2 class="form-signin-heading">Sign in</h2>

				<div class="row mt-3">
					<label for="username" class="sr-only screenreader">User</label> <input
						type="text" id="username" th:field="*{username}"
						class="form-control" placeholder="User" required autofocus>
				</div>
				<div class="row mt-3">
					<label for="password" class="sr-only screenreader">Password</label>
					<input type="password" id="password" th:field="*{password}"
						class="form-control" placeholder="Password" required
						pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
						title="Must contain at least 1 uppercase letter, 1 lowercase letter, 1 number, and be 8+ characters long.">
				</div>
				<div class="row">
					<input type="hidden" id="email" th:field="*{email}"
						class="form-control">
				</div>
				<sec:csrfInput />
				<div class="row mt-3">
					<div class="col">
						<button type="submit" class="btn btn-secondary my-1"
							value="cancel">Cancel</button>
					</div>
					<div class="col">
						<button type="submit" class="btn btn-primary my-1" value="signIn">Sign
							In</button>
					</div>
				</div>
			</form>
		</div>
		<div class="container">
			<div class="row">
				<div class="col text-center">
					<a th:href="@{/forgotUser}">Forgot User?</a><br /> <a
						th:href="@{/requestNewPassword}">Forgot Password?</a>
				</div>
				<div class="col text-center" data-bs-toggle="collapse">
					<a th:href="@{/register}">Register</a>
				</div>
			</div>
		</div>
		<!-- GitHub OAuth2 -->
		<div class="container mt-4">
			<div class="row">
				<a th:href="@{/oauth2/authorization/facebook}"
					class="btn btn-light border border-dark my-1"> <img
					th:src="@{/images/sign_on_facebook.png}" height="50px" width="350px"
					alt="Sign in with Facebook" />
				</a>
			</div>
			<div class="row">
				<a th:href="@{/oauth2/authorization/github}"
					class="btn btn-light border border-dark my-1"> <img
					th:src="@{/images/sign_on_git_hub.png}" height="50px" width="350px"
					alt="Sign in with GitHub" />
				</a>
			</div>
			<div class="row">
				<a th:href="@{/oauth2/authorization/google}"
					class="btn btn-light border border-dark my-1"> <img
					th:src="@{/images/sign_on_google.png}" height="50px" width="350px"
					alt="Sign in with Google" />
				</a>
			</div>
		</div>
	</div>
</body>
</html>
